name: Update README Stats

on:
  push:
    paths:
      - 'scripts/**'
      - 'examples/**'

jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Count scripts, examples, requests
        run: |
          SCRIPTS_COUNT=$(ls scripts | wc -l)
          EXAMPLES_COUNT=$(ls examples | wc -l)
          REQUESTS_PROCESSED=$(cat examples/request_count.txt || echo 0)
          DATE_NOW=$(date +"%Y-%m-%d %H:%M:%S")
          # Remove old stats section
          sed -i "/^## Stats/,+4d" README.md
          # Add updated stats section
          echo "## Stats" >> README.md
          echo "- 🖥 Scripts: $SCRIPTS_COUNT" >> README.md
          echo "- 📂 Examples: $EXAMPLES_COUNT" >> README.md
          echo "- ✅ Requests Processed: $REQUESTS_PROCESSED" >> README.md
          echo "- ⏰ Last Update: $DATE_NOW" >> README.md
      - name: Commit README update
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update README stats" || echo "No changes to commit"
          git push
